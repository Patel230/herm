name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOWORK: "off"

jobs:
  file-length:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: cd tools/ci-check && go build -o "$RUNNER_TEMP/ci-check" .
      - run: '"$RUNNER_TEMP/ci-check" file-length .'

  docstring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: cd tools/ci-check && go build -o "$RUNNER_TEMP/ci-check" .
      - run: '"$RUNNER_TEMP/ci-check" docstring .'

  positional-params:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: cd tools/ci-check && go build -o "$RUNNER_TEMP/ci-check" .
      - run: '"$RUNNER_TEMP/ci-check" positional-params .'

  cpsl-xcframework-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify tracked CPSL XCFramework placeholder is not a symlink
        run: |
          set -eu
          path="scripts/cpsl-xcframework-placeholder/cpsl.xcframework"
          if [ -L "$path" ]; then
            echo "error: $path is a symlink; commit the bootstrap directory instead" >&2
            echo "Run: scripts/bootstrap-cpsl-xcframework-placeholder.sh" >&2
            exit 1
          fi
          test -f "$path/.bootstrap-placeholder"
