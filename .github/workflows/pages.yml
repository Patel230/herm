name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve released version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            git fetch --force --tags origin
            VERSION="$(git tag --list 'v*' --sort=-version:refname | sed -n '1p')"
            if [[ -z "$VERSION" ]]; then
              VERSION="latest"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved website version: $VERSION"

      - name: Inject version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s|__VERSION__|$VERSION|g" docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
